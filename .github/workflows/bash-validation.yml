name: bash-validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Syntax check
        run: bash -n adv-install

      - name: Run mocked tests
        run: bash tests/run-tests.sh

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: .
          severity: error
